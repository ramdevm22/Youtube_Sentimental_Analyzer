<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Sentiment Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      min-height: 500px;
      background: #030712;
      color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1f2937;
    }
    .logo {
      width: 32px; height: 32px;
      background: #dc2626;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 11px; color: #6b7280; }

    .content { padding: 16px; }

    .video-banner {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .video-banner .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; flex-shrink: 0; }
    .video-banner .vid-id { font-size: 12px; color: #9ca3af; font-family: monospace; }
    .video-banner.no-video .dot { background: #6b7280; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #dc2626; color: white; }
    .btn-primary:not(:disabled):hover { background: #b91c1c; }

    .section { margin-top: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .sentiment-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px;
    }
    .sentiment-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .sentiment-label { font-size: 13px; color: #9ca3af; }
    .sentiment-value { font-size: 15px; font-weight: 600; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .neutral  { color: #f59e0b; }
    .mixed    { color: #a78bfa; }

    .score-bar-wrap { background: #1f2937; border-radius: 4px; height: 6px; margin: 8px 0; }
    .score-bar { height: 6px; border-radius: 4px; transition: width 0.8s ease; }

    .summary {
      font-size: 12px;
      color: #d1d5db;
      line-height: 1.6;
      border-top: 1px solid #1f2937;
      padding-top: 10px;
      margin-top: 10px;
    }

    .themes { display: flex; flex-wrap: wrap; gap: 6px; }
    .theme-chip {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      color: #9ca3af;
    }

    /* Chat */
    .chat-area {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .bubble {
      max-width: 85%;
      padding: 7px 10px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.5;
    }
    .msg.user .bubble { background: #dc2626; color: white; border-top-right-radius: 3px; }
    .msg.bot .bubble  { background: #1f2937; color: #e5e7eb; border-top-left-radius: 3px; }

    .chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
    .chat-input {
      flex: 1;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 8px 10px;
      color: #f9fafb;
      font-size: 12px;
      outline: none;
    }
    .chat-input:focus { border-color: #dc2626; }
    .chat-input::placeholder { color: #6b7280; }
    .chat-send {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner-wrap { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; }
    .dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #4b5563;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 0.8s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    .error-box {
      background: #450a0a;
      border: 1px solid #991b1b;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #fca5a5;
      margin-top: 10px;
    }

    .open-full {
      display: block;
      text-align: center;
      font-size: 11px;
      color: #6b7280;
      text-decoration: none;
      margin-top: 14px;
      padding: 8px;
      border: 1px solid #1f2937;
      border-radius: 8px;
    }
    .open-full:hover { color: #9ca3af; border-color: #374151; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
        <path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/>
      </svg>
    </div>
    <div>
      <h1>YT Sentiment Analyzer</h1>
      <p>RAG-powered video analysis</p>
    </div>
  </div>

  <div class="content">
    <!-- Video detection banner -->
    <div id="videoBanner" class="video-banner no-video">
      <div class="dot"></div>
      <span id="videoLabel" class="vid-id">No YouTube video detected</span>
    </div>

    <button id="analyzeBtn" class="btn btn-primary" disabled>
      Analyze This Video
    </button>

    <div id="errorBox" class="error-box" style="display:none"></div>
    <div id="loadingBox" class="spinner-wrap" style="display:none">
      Analyzing video… this may take 20–40s
      <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Sentiment results -->
    <div id="results" style="display:none">
      <div class="section">
        <div class="section-title">Sentiment Analysis</div>
        <div class="sentiment-card">
          <div class="sentiment-row">
            <span class="sentiment-label">Overall</span>
            <span id="overallSentiment" class="sentiment-value"></span>
          </div>
          <div class="sentiment-row">
            <span class="sentiment-label">Score</span>
            <span id="scoreValue" class="sentiment-value"></span>
          </div>
          <div class="score-bar-wrap">
            <div id="scoreBar" class="score-bar"></div>
          </div>
          <div id="summaryText" class="summary"></div>
        </div>
      </div>

      <div class="section" id="themesSection" style="display:none">
        <div class="section-title">Key Themes</div>
        <div id="themeChips" class="themes"></div>
      </div>

      <div class="section">
        <div class="section-title">Ask about this video</div>
        <div class="chat-area" id="chatArea">
          <div class="msg bot">
            <div class="bubble">Video analyzed! Ask me anything about its content.</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" class="chat-input" placeholder="Ask a question…" />
          <button id="chatSend" class="chat-send">➤</button>
        </div>
      </div>
    </div>

    <a id="openFullLink" class="open-full" href="#" target="_blank" style="display:none">
      Open full dashboard ↗
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
